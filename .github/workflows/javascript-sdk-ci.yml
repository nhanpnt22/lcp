name: JavaScript SDK CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    paths:
      - "sdks/javascript/**"
      - ".github/workflows/javascript-sdk-ci.yml"
  push:
    branches:
      - main
    paths:
      - "sdks/javascript/**"
      - ".github/workflows/javascript-sdk-ci.yml"
  workflow_dispatch:

jobs:
  release-gates:
    name: Release Gates
    runs-on: ubuntu-latest
    environment: testing
    defaults:
      run:
        working-directory: sdks/javascript
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdks/javascript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build SDK bundles for IndexedDB UAT
        run: npm run build

      - name: Run IndexedDB cache UAT (all cache functions)
        run: npx playwright test -c playwright.config.ts tests/browser/sdk.idb.contract.onebyone.spec.ts tests/browser/sdk.idb.operations.spec.ts --project=chromium

      - name: Run release gate script
        run: npm run test:release

      - name: Run browser gate
        run: npm run test:browser

      - name: Run coverage gate
        run: npm run test:coverage

