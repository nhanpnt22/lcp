name: JavaScript Cross-SDK Parity CI

on:
  pull_request:
    paths:
      - "sdks/javascript/**"
      - "sdks/go/**"
      - "sdks/flutter/**"
      - "specs/cross_sdk_dataset.schema.json"
      - "scripts/run_cross_go_flutter_javascript_sqlite_parity.sh"
      - ".github/workflows/javascript-cross-sdk-parity.yml"
  push:
    branches:
      - main
    paths:
      - "sdks/javascript/**"
      - "sdks/go/**"
      - "sdks/flutter/**"
      - "specs/cross_sdk_dataset.schema.json"
      - "scripts/run_cross_go_flutter_javascript_sqlite_parity.sh"
      - ".github/workflows/javascript-cross-sdk-parity.yml"
  workflow_dispatch:

jobs:
  parity:
    name: Cross-SDK SQLite Parity
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/javascript
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdks/javascript/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sdks/go/go.mod
          cache-dependency-path: sdks/go/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install Flutter dependencies
        run: dart pub get
        working-directory: sdks/flutter

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run cross-SDK parity orchestrator
        run: ../../scripts/run_cross_go_flutter_javascript_sqlite_parity.sh

      - name: Upload parity evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-sdk-sqlite-evidence
          path: |
            sdks/javascript/test-results/cross-sdk-*/datasets.json
            sdks/javascript/test-results/cross-sdk-*/go-evidence.json
            sdks/javascript/test-results/cross-sdk-*/flutter-evidence.json
            sdks/javascript/test-results/cross-sdk-*/javascript-evidence.json
