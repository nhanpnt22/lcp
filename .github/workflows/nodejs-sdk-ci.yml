name: NodeJS SDK CI

on:
  pull_request:
    paths:
      - "sdks/nodejs/**"
      - ".github/workflows/nodejs-sdk-ci.yml"
  push:
    branches:
      - main
    paths:
      - "sdks/nodejs/**"
      - ".github/workflows/nodejs-sdk-ci.yml"
  workflow_dispatch:

jobs:
  release-gates:
    name: Release Gates
    runs-on: ubuntu-latest
    environment: testing
    env:
      GOOGLE_CLOUD_PROJECT: aiptesting
      LCP_STORAGE_GCS_URI: gs://aiptesting.firebasestorage.app/lcp
    defaults:
      run:
        working-directory: sdks/nodejs
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdks/nodejs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure GCP credentials
        shell: bash
        run: |
          if [[ -z "${{ secrets.GCP_SA_KEY }}" ]]; then
            echo "GCP_SA_KEY secret is required in environment 'testing'."
            exit 1
          fi
          key_file="$RUNNER_TEMP/gcp-sa-key.json"
          printf '%s' '${{ secrets.GCP_SA_KEY }}' > "$key_file"
          echo "GCP_SA_KEY=$key_file" >> "$GITHUB_ENV"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$key_file" >> "$GITHUB_ENV"

      - name: Run release check
        run: npm run release:check
