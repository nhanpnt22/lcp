name: Flutter SDK CI

on:
  pull_request:
    paths:
      - "sdks/flutter/**"
      - ".github/workflows/flutter-sdk-ci.yml"
  push:
    branches:
      - main
    paths:
      - "sdks/flutter/**"
      - ".github/workflows/flutter-sdk-ci.yml"
  workflow_dispatch:

jobs:
  release-gates:
    name: Release Gates
    runs-on: ubuntu-latest
    environment: testing
    defaults:
      run:
        working-directory: sdks/flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze

      - name: Run SQLite cache UAT (all cache functions)
        run: dart test test/sqlite_persistent_cache_store_test.dart -r expanded

      - name: Test
        run: dart test

      - name: Detect publish mode
        id: publish_mode
        run: |
          if grep -Eq "^publish_to:\\s*('?none'?)" pubspec.yaml; then
            echo "run_dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_dry_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish dry-run gate
        if: steps.publish_mode.outputs.run_dry_run == 'true'
        run: dart pub publish --dry-run

      - name: Skip publish dry-run for private package mode
        if: steps.publish_mode.outputs.run_dry_run != 'true'
        run: echo "Skipping publish dry-run because publish_to is none."
